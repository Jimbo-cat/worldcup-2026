<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup — 赛程日历 & 分组战力</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c8a960;--gold-light:#f0d68a;--bg:#0a0e1a;--card:#141e2b;--card-border:#2a3a4a;--text:#e8edf5;--text-muted:#8899aa;--text-dim:#556;--accent-green:#2d8a4e;--accent-red:#c0392b}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body.detail-view{overflow:hidden}
.hero{background:linear-gradient(135deg,#0f1923 0%,#1a2a3a 50%,#0d2818 100%);padding:30px 20px 20px;text-align:center;border-bottom:3px solid var(--gold);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 50% 50%,rgba(200,169,96,0.08) 0%,transparent 60%);animation:shimmer 15s ease-in-out infinite}
@keyframes shimmer{0%,100%{transform:translate(0,0)}50%{transform:translate(5%,5%)}}
.hero .trophy{font-size:40px;display:inline-block;margin-bottom:4px;position:relative;z-index:1}
.hero h1{font-size:clamp(22px,4vw,40px);font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1}
.hero .subtitle{font-size:14px;color:var(--text-muted);margin-top:4px;position:relative;z-index:1}
.hero .date-badge{display:inline-block;margin-top:8px;padding:4px 16px;border:1px solid rgba(200,169,96,0.3);border-radius:20px;font-size:13px;color:var(--gold);background:rgba(200,169,96,0.08);position:relative;z-index:1}
.calendar-section{max-width:1400px;margin:0 auto;padding:16px 16px 0}
.calendar-section h2{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.calendar-wrap{background:var(--card);border:1px solid var(--card-border);border-radius:14px;overflow:hidden}
.calendar-nav{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:linear-gradient(90deg,#1d2d3d,#253545);border-bottom:1px solid var(--card-border)}
.calendar-nav button{background:rgba(200,169,96,0.1);border:1px solid rgba(200,169,96,0.2);color:var(--gold);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
.calendar-nav button:hover{background:rgba(200,169,96,0.2)}
.calendar-nav .month-label{font-weight:700;color:var(--gold-light);font-size:15px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.calendar-header{background:#1a2635;padding:8px 2px;text-align:center;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--card-border)}
.calendar-day{min-height:120px;padding:0;border-right:1px solid rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.03);background:rgba(255,255,255,0.01);position:relative;display:flex;flex-direction:column}
.calendar-day.today{background:rgba(200,169,96,0.08);border:1px solid var(--gold);box-shadow:inset 0 0 20px rgba(200,169,96,0.05)}
.calendar-day.today .day-num{color:var(--gold);font-weight:800}
.calendar-day.empty{background:transparent}
.calendar-day.has-match{cursor:pointer}
.calendar-day.has-match:hover{background:rgba(200,169,96,0.05)}
.cal-day-header{display:flex;justify-content:space-between;align-items:center;padding:3px 5px;background:rgba(0,0,0,0.2);flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.05)}
.cal-day-header .day-num{font-size:13px;font-weight:700;color:var(--text-dim)}
.cal-day-header .match-count{font-size:10px;color:var(--text-muted);white-space:nowrap}
.cal-matches{flex:1;overflow-y:auto;padding:3px}
.cal-match{display:grid;grid-template-columns:20px 1fr 40px;gap:3px;padding:4px 5px;margin-bottom:2px;border-radius:4px;background:rgba(200,169,96,0.06);align-items:center;transition:background .15s;cursor:pointer}
.cal-match:hover{background:rgba(200,169,96,0.15)}
.cal-match .cm-grp{font-size:11px;font-weight:800;color:var(--gold);text-align:center}
.cal-match .cm-vs-row{display:flex;align-items:center;justify-content:space-between;gap:1px;min-width:0}
.cal-match .cm-vs-row .cm-team{font-size:11px;font-weight:600;color:#dde;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:center}
.cal-match .cm-vs-row .cm-vs-word{font-size:10px;font-weight:700;color:var(--gold);flex-shrink:0;padding:0 3px}
.cal-match .cm-time{font-size:11px;font-weight:700;color:var(--gold-light);text-align:right;line-height:1.2}
.cal-match .cm-tz{font-size:7px;color:var(--text-dim);text-align:right;line-height:1}
.cal-match .cm-vs-row.cm-done{display:flex;align-items:center;justify-content:space-between}
.cal-match .cm-team.cm-team-left,.cal-match .cm-team.cm-team-right{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-match .cm-team.cm-team-left{text-align:right;flex:1.5;padding-right:4px}
.cal-match .cm-team.cm-team-right{text-align:left;flex:1.5;padding-left:4px}
.cal-match .cm-score-block{display:inline-flex;align-items:center;gap:0;flex-shrink:0;background:rgba(231,76,60,0.12);padding:0 6px;border-radius:4px;line-height:1.3}
.cal-match .cm-score-num{font-size:14px;font-weight:900;color:#e74c3c}
.cal-match .cm-score-num.cm-sn-left{padding-right:1px}
.cal-match .cm-score-num.cm-sn-right{padding-left:1px}
.cal-match .cm-vs-word-score{font-size:12px;font-weight:700;color:#e74c3c;padding:0 0}
.cal-match .cm-status-finished{font-size:9px;color:#27ae60;font-weight:600;margin-top:2px;letter-spacing:0.5px;text-align:center}
.cal-match .cm-status-live{font-size:9px;color:#f39c12;font-weight:700;margin-top:2px;text-align:center;animation:pulse-live 1.5s ease-in-out infinite}
@keyframes pulse-live{0%,100%{opacity:1}50%{opacity:0.5}}
.cal-match .cm-vs-row.cm-done.cm-live .cm-score-block{background:rgba(243,156,18,0.2);border:1px solid rgba(243,156,18,0.3)}
.cal-match .cm-vs-row.cm-done.cm-live .cm-score-num{color:#f39c12}
.cal-match .tbc{font-size:9px;color:var(--text-dim)}
.cal-match.ko-match{background:rgba(192,57,43,0.1)}
.cal-match.ko-match .cm-grp{color:var(--accent-red)}
.cal-match.ko-match .cm-time{color:var(--accent-red)}
.container{max-width:1400px;margin:0 auto;padding:20px 16px 40px}
.legend{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:14px 18px}
.legend-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.legend-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.legend-stars{display:flex;gap:4px}
.legend-stars span{font-size:12px;color:var(--gold)}
.legend-labels{display:flex;gap:6px;flex-wrap:wrap}
.legend-labels .tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(200,169,96,0.1);border:1px solid rgba(200,169,96,0.2);color:var(--gold)}
.stats-bar{display:flex;gap:14px;font-size:12px;color:var(--text-muted)}
.stats-bar strong{color:var(--gold);font-weight:700}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.group-card{background:linear-gradient(160deg,var(--card) 0%,#1a2635 100%);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s}
.group-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.4);border-color:var(--gold)}
.group-header{padding:12px 16px;background:linear-gradient(90deg,#1d2d3d,#253545);border-bottom:2px solid var(--gold);font-size:16px;font-weight:800;letter-spacing:1px;color:var(--gold-light)}
.group-body{padding:4px 12px 12px}
.team-row{display:flex;align-items:flex-start;padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.03);gap:8px;cursor:pointer;transition:background .15s;border-radius:6px}
.team-row:last-child{border-bottom:none}
.team-row:hover{background:rgba(200,169,96,0.06)}
.team-pos{width:20px;font-size:11px;font-weight:700;color:var(--text-dim);text-align:center;flex-shrink:0;padding-top:3px}
.team-info{flex:1;min-width:0}
.team-name{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:baseline;gap:4px;flex-wrap:wrap}
.team-name .flag{font-size:16px}
.team-name .zh{font-weight:400;color:var(--text-muted);font-size:12px}
.team-name .record{font-size:12px;color:var(--text-dim);font-weight:500;margin-left:auto}
.team-rating{display:flex;align-items:center;gap:1px;margin-top:2px}
.star{color:var(--gold);font-size:12px;line-height:1}
.star.empty{color:#3a4a5a}
.star.half{position:relative;display:inline-block;color:#3a4a5a}
.star.half::before{content:'★';position:absolute;left:0;top:0;width:50%;overflow:hidden;color:var(--gold)}
.rating-score{font-size:10px;color:var(--text-dim);margin-left:4px;font-weight:600}
.team-reason{font-size:11px;color:var(--text-muted);margin-top:2px;line-height:1.35}
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;overflow-y:auto;padding:20px;backdrop-filter:blur(4px)}
.detail-overlay.active{display:block}
.detail-card{max-width:1000px;margin:20px auto;background:linear-gradient(160deg,#141e2b,#1a2635);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail-close{position:sticky;top:0;float:right;background:rgba(200,169,96,0.1);border:1px solid rgba(200,169,96,0.2);color:var(--gold);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;margin:10px;transition:all .15s}
.detail-close:hover{background:rgba(200,169,96,0.25)}
.detail-hero{padding:24px 28px 16px;background:linear-gradient(135deg,#1d2d3d,#253545);border-bottom:2px solid var(--gold)}
.detail-hero .team-big{font-size:32px;font-weight:900;display:flex;align-items:center;gap:12px}
.detail-hero .team-big .flag{font-size:36px}
.detail-hero .team-big .zh{font-weight:400;color:var(--text-muted);font-size:20px}
.detail-hero .detail-meta{display:flex;flex-wrap:wrap;gap:20px;margin-top:12px;font-size:13px;color:var(--text-muted)}
.detail-hero .detail-meta span{display:flex;align-items:center;gap:4px}
.detail-hero .rating-big{display:flex;align-items:center;gap:6px;margin-top:8px}
.detail-hero .rating-big .star{font-size:18px}
.detail-hero .reason-big{font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.5;padding:8px 12px;background:rgba(200,169,96,0.05);border-radius:8px;border-left:3px solid var(--gold)}
.detail-tabs{display:flex;border-bottom:1px solid var(--card-border);overflow-x:auto}
.detail-tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.detail-tab:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.detail-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.detail-content{padding:20px 24px}
.detail-panel{display:none}
.detail-panel.active{display:block}

/* ===== MATCH REPORT OVERLAY ===== */
.match-report-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto;padding:20px;backdrop-filter:blur(4px)}
.match-report-overlay.active{display:block}
.match-report-card{max-width:700px;margin:40px auto;background:linear-gradient(160deg,#141e2b,#1a2635);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;animation:fadeIn .3s ease}
.match-report-close{position:sticky;top:0;float:right;background:rgba(200,169,96,0.1);border:1px solid rgba(200,169,96,0.2);color:var(--gold);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;margin:10px;transition:all .15s}
.match-report-close:hover{background:rgba(200,169,96,0.25)}
.mr-header{padding:28px 28px 16px;text-align:center;background:linear-gradient(135deg,#1d2d3d,#253545);border-bottom:2px solid var(--gold)}
.mr-teams{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.mr-team{text-align:center;min-width:100px}
.mr-team .flag{font-size:40px;display:block}
.mr-team .name{font-size:18px;font-weight:700;margin-top:6px}
.mr-team .zh{font-size:14px;color:var(--text-muted);font-weight:400}
.mr-score{font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px}
.mr-score .mr-colon{-webkit-text-fill-color:var(--text-muted);color:var(--text-muted)}
.mr-status{font-size:13px;color:var(--text-muted);margin-top:6px}
.mr-group{margin-top:8px;font-size:12px;color:var(--text-dim);background:rgba(200,169,96,0.08);display:inline-block;padding:2px 10px;border-radius:10px}
.mr-body{padding:20px 28px}
.mr-section-title{font-size:15px;font-weight:700;color:var(--gold);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--card-border)}
.mr-section-title:first-child{margin-top:0}
.mr-event{display:flex;align-items:center;gap:10px;padding:6px 0}
.mr-event-time{background:var(--card);color:var(--gold);font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px;min-width:40px;text-align:center;font-family:monospace}
.mr-event-icon{font-size:14px;min-width:20px;text-align:center}
.mr-event-desc{font-size:14px;color:var(--text)}
.mr-event-desc .player{font-weight:600;color:var(--gold-light)}
.mr-event-desc .assist{font-size:12px;color:var(--text-muted)}
.mr-event.away{flex-direction:row-reverse}
.mr-event.away .mr-event-time{order:0}
.mr-event.away .mr-event-desc{text-align:right}
.mr-event.away .mr-event-icon{order:-1}
.mr-event.away .mr-event-desc{color:var(--text)}
.mr-empty{text-align:center;padding:30px 0;color:var(--text-muted);font-size:14px}
.mr-lineup{margin-top:10px}
.mr-lineup-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mr-lineup-col h4{font-size:13px;font-weight:600;color:var(--gold);margin-bottom:6px}
.mr-lineup-col ul{list-style:none;padding:0}
.mr-lineup-col li{font-size:12px;color:var(--text-muted);padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.pos-tag{display:inline-block;font-size:10px;padding:0 5px;border-radius:3px;margin-right:4px;font-weight:600}
.pos-GK{background:#2d8a4e20;color:#2d8a4e}
.pos-DEF{background:#c0392b20;color:#e74c3c}
.pos-MID{background:#2980b920;color:#3498db}
.pos-FWD{background:#c8a96020;color:var(--gold)}
.squad-table{width:100%;border-collapse:collapse;font-size:12px}
.squad-table th{padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--card-border);background:#1a2635}
.squad-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.squad-table tr:hover td{background:rgba(200,169,96,0.03)}
.squad-table .pos-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase}
.pos-GK{background:rgba(200,169,96,0.15);color:var(--gold)}
.pos-DEF{background:rgba(45,138,78,0.15);color:#5dca8a}
.pos-MID{background:rgba(52,152,219,0.15);color:#5dade2}
.pos-FWD{background:rgba(192,57,43,0.15);color:#e74c3c}
.squad-table .club{font-size:10px;color:var(--text-muted)}
.squad-table .cn{font-size:11px;color:#aabbcc;font-weight:500}
.squad-table .age{text-align:center;color:var(--text-muted);font-size:11px}
.squad-table .ps{display:flex;gap:1px;align-items:center;width:90px}
.squad-table .ps .star{font-size:9px}
.match-table{width:100%;border-collapse:collapse;font-size:13px}
.match-table th{padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--card-border);background:#1a2635}
.match-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.match-table .match-vs{font-weight:700}
.match-table .match-win{color:var(--accent-green)}
.match-table .match-loss{color:#e74c3c}
.match-table .match-pending{color:var(--text-dim)}
.match-table .match-draw{color:var(--gold)}
.match-table .match-group{font-size:11px;color:var(--text-dim)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.stat-box{background:rgba(255,255,255,0.02);border:1px solid var(--card-border);border-radius:8px;padding:12px 14px}
.stat-box .stat-val{font-size:24px;font-weight:800;color:var(--gold)}
.stat-box .stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
@media(max-width:700px){
  .groups-grid{grid-template-columns:1fr}
  .legend{flex-direction:column;align-items:flex-start}
  .stats-bar{flex-wrap:wrap;gap:6px;font-size:11px}
  .calendar-day{min-height:60px}
  .cal-match .cm-team{font-size:10px}
  .detail-card{margin:10px}
  .detail-hero{padding:16px}
  .detail-hero .team-big{font-size:24px}
  .detail-content{padding:12px}
  .squad-table th,.squad-table td{padding:3px 4px;font-size:10px}
  .detail-tab{padding:8px 12px;font-size:12px}
}
.footer{text-align:center;padding:24px 16px;font-size:11px;color:var(--text-dim);border-top:1px solid #1a2a3a;margin-top:30px}
</style>
</head>
<body>
<div class="hero">
  <div class="trophy">🏆</div>
  <h1>2026 FIFA World Cup ™</h1>
  <p class="subtitle">🇨🇦 Canada · 🇲🇽 Mexico · 🇺🇸 United States</p>
  <div class="date-badge">📅 June 11 – July 19, 2026 &nbsp;·&nbsp; 48 Teams · 12 Groups</div>
</div>

<div class="calendar-section" id="calendarSection">
  <h2>📅 赛程日历 <span style="font-size:11px;color:var(--text-dim);font-weight:400">(北京时间 UTC+8)</span></h2>
  <div class="calendar-wrap">
    <div class="calendar-nav">
      <button onclick="switchMonth(-1)">‹ Prev</button>
      <span class="month-label" id="monthLabel">June 2026</span>
      <button onclick="switchMonth(1)">Next ›</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<div class="container">
  <div class="legend">
    <div class="legend-left">
      <span class="legend-title">战力评级</span>
      <div class="legend-stars"><span>★</span><span>★</span><span>★</span><span>★</span><span>★</span></div>
      <div class="legend-labels">
        <span class="tag">★★★★★ 夺冠热门</span>
        <span class="tag">★★★★ 实力强劲</span>
        <span class="tag">★★★ 竞争力不错</span>
        <span class="tag">★★ 实力有限</span>
        <span class="tag">★ 黑马/鱼腩</span>
      </div>
    </div>
    <div class="stats-bar">
      <span>⚽ <strong>48</strong> 球队</span>
      <span>🏟️ <strong>16</strong> 城市</span>
      <span>📅 <strong>104</strong> 场比赛</span>
    </div>
  </div>
  <div class="groups-grid" id="groupsContainer"></div>
</div>

<div class="footer">
  <p>数据来源：BBC Sport · FIFA · 战力评分为主观分析，仅供参考 🌟</p>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div id="detailContent"></div>

// ===== STAR RENDERER =====
function renderStars(rating,size=12){
  let h="";
  for(let i=0;i<5;i++){
    const d=rating-i;
    if(d>=1) h+="<span class=\"star\" style=\"font-size:"+size+"px\">★</span>";
    else if(d>=0.5) h+="<span class=\"star half\" style=\"font-size:"+size+"px\">☆</span>";
    else h+="<span class=\"star empty\" style=\"font-size:"+size+"px\">★</span>";
  }
  return h+"<span class=\"rating-score\">"+(rating||0).toFixed(1)+"</span>";
}

// ===== UK TIME TO BEIJING =====
// UK BST = UTC+1, Beijing = UTC+8, so +7 hours
function ukToBeijing(day,month,timeStr){
  if(!timeStr||timeStr==="TBC") return {day,month,time:"TBC"};
  const [h,m]=timeStr.split(":").map(Number);
  const totalMin=h*60+m+7*60;
  const newDays=Math.floor(totalMin/(24*60));
  const rem=totalMin%(24*60);
  const newH=Math.floor(rem/60);
  const newM=rem%60;
  let bjDay=day+newDays,bjMonth=month,bjYear=2026;
  const dim=new Date(bjYear,bjMonth,0).getDate();
  if(bjDay>dim){bjDay-=dim;bjMonth+=1}
  return{day:bjDay,month:bjMonth,time:String(newH).padStart(2,"0")+":"+String(newM).padStart(2,"0")};
}

// ===== LIVE MATCH DETECTION =====
function isLiveMatch(m){
  if(!m.sc) return false;           // no score = upcoming
  if(m.st==='f') return false;      // explicitly finished
  if(m.st==='l') return true;       // explicitly live
  // Auto-detect from time: if BJT is within match window (2.5h from kickoff)
  const bj = ukToBeijing(m.d,m.m,m.t);
  const [hh,mm] = bj.time.split(':').map(Number);
  const kickoff = new Date(2026, bj.month-1, bj.day, hh, mm);
  const now = new Date();
  const elapsed = (now - kickoff) / 60000; // minutes since kickoff
  return elapsed >= 0 && elapsed < 155;     // 0-155 min = match window (~2h35m)
}

// ===== CALENDAR =====
let calMonth = 6, calYear = 2026;

function buildCalendar(){
  const grid = document.getElementById('calendarGrid');
  const label = document.getElementById('monthLabel');
  label.textContent = new Date(calYear,calMonth-1).toLocaleString('en',{month:'long',year:'numeric'});
  const today = new Date();
  const firstDay = new Date(calYear,calMonth-1,1).getDay();
  const daysInMonth = new Date(calYear,calMonth,0).getDate();
  
  let html = '<div class="calendar-header">Mon</div><div class="calendar-header">Tue</div><div class="calendar-header">Wed</div><div class="calendar-header">Thu</div><div class="calendar-header">Fri</div><div class="calendar-header">Sat</div><div class="calendar-header">Sun</div>';
  let startIdx = firstDay === 0 ? 6 : firstDay - 1;
  for(let i=0;i<startIdx;i++) html += '<div class="calendar-day empty"></div>';
  
  for(let d=1;d<=daysInMonth;d++){
    const isToday = today.getDate()===d && today.getMonth()+1===calMonth && today.getFullYear()===calYear;
    // Find matches by Beijing date
    const dayMatches = [];
    for(let mi=0;mi<MATCHES.length;mi++){
      const m = MATCHES[mi];
      const bj = ukToBeijing(m.d,m.m,m.t);
      if(bj.day===d && bj.month===calMonth) dayMatches.push({...m,bjTime:bj.time,idx:mi});
    }
    let cls = 'calendar-day';
    if(isToday) cls += ' today';
    if(dayMatches.length) cls += ' has-match';
    
    html += '<div class="'+cls+'">';
    html += '<div class="cal-day-header"><span class="day-num">'+d+'</span><span class="match-count">今日比赛 '+dayMatches.length+' 场</span></div>';
    html += '<div class="cal-matches">';
    for(const m of dayMatches){
      const isKO = m.p!=='GS';
      const cnH = TEAMS[m.h] ? TEAMS[m.h].zh : m.h;
      const cnA = TEAMS[m.a] ? TEAMS[m.a].zh : m.a;
      const grpLabel = isKO ? PHASE_LABELS[m.p] : m.grp;
      const grpCls = isKO ? 'ko-match' : '';
      const isTBC = m.h==='TBC'||m.a==='TBC';
      const hasScore = m.sc && !isTBC;
      
      html += '<div class="cal-match '+grpCls+'" onclick="openMatchReport('+m.idx+')">';
      html += '<span class="cm-grp">'+grpLabel+'</span>';
      if(hasScore){
        const [hs,as] = m.sc.split('-');
        const isLive = isLiveMatch(m);
        html += '<div class="cm-vs-row cm-done'+(isLive?' cm-live':'')+'"><span class="cm-team cm-team-left">'+cnH+'</span><span class="cm-score-block"><span class="cm-score-num cm-sn-left">'+hs+'</span><span class="cm-vs-word-score">:</span><span class="cm-score-num cm-sn-right">'+as+'</span></span><span class="cm-team cm-team-right">'+cnA+'</span></div>';
        html += '<div class="cm-status-'+(isLive?'live':'finished')+'">'+((isLive?'🔴 进行中':'已结束'))+'</div>';
      } else if(isTBC){
        html += '<div class="cm-vs-row"><span class="cm-team">待定</span><span class="cm-vs-word">VS</span><span class="cm-team">待定</span></div>';
        html += '<div class="cm-time tbc">待定</div>';
      } else {
        html += '<div class="cm-vs-row"><span class="cm-team">'+cnH+'</span><span class="cm-vs-word">VS</span><span class="cm-team">'+cnA+'</span></div>';
        html += '<div><div class="cm-time">'+m.bjTime+'</div><div class="cm-tz">北京时间</div></div>';
      }
      html += '</div>';
    }
    html += '</div></div>';
  }
  grid.innerHTML = html;
}

function switchMonth(dir){
  calMonth += dir;
  if(calMonth>12){calMonth=1;calYear++;}
  if(calMonth<1){calMonth=12;calYear--;}
  buildCalendar();
}

function renderGroups(){
  const c = document.getElementById('groupsContainer');
  let html = '';
  for(const g of GROUP_DATA){
    // Calculate standings from MATCHES
    const standings = g.teams.map(t=>{
      const td = TEAMS[t]||{zh:t,flag:'🌍',rating:2,reason:''};
      let pts=0,w=0,d=0,l=0,gf=0,ga=0;
      for(const m of MATCHES){
        if(m.h===t && m.sc && m.a!=='TBC'){
          const [hs,as] = m.sc.split('-').map(Number);
          gf+=hs; ga+=as;
          if(hs>as){w++;pts+=3;}
          else if(hs===as){d++;pts+=1;}
          else l++;
        } else if(m.a===t && m.sc && m.h!=='TBC'){
          const [hs,as] = m.sc.split('-').map(Number);
          ga+=hs; gf+=as;
          if(as>hs){w++;pts+=3;}
          else if(hs===as){d++;pts+=1;}
          else l++;
        }
      }
      const gd = gf-ga;
      return {name:t,zh:td.zh,flag:td.flag,rating:td.rating,reason:td.reason,pts,w,d,l,gf,ga,gd};
    });
    // Sort: pts > gd > gf
    standings.sort((a,b)=>{
      if(b.pts!==a.pts) return b.pts-a.pts;
      if(b.gd!==a.gd) return b.gd-a.gd;
      return b.gf-a.gf;
    });
    
    html += '<div class="group-card" id="group-'+g.id+'">';
    html += '<div class="group-header">Group '+g.id+'</div><div class="group-body">';
    standings.forEach((s,i)=>{
      html += '<div class="team-row" onclick="openDetail(\''+s.name+'\')">';
      html += '<div class="team-pos">'+(i+1)+'</div><div class="team-info">';
      
      let recStr = '';
      if(s.w+s.d+s.l>0){
        recStr = s.pts+'分 '+s.w+'-'+s.d+'-'+s.l+' ('+s.gf+'-'+s.ga+(s.gd>0?' +'+s.gd:s.gd<0?' '+s.gd:'')+')';
      }
      
      html += '<div class="team-name"><span class="flag">'+s.flag+'</span>'+s.name+' <span class="zh">'+s.zh+'</span><span class="record">'+recStr+'</span></div>';
      html += '<div class="team-rating">'+renderStars(s.rating)+'</div>';
      html += '<div class="team-reason">'+s.reason+'</div>';
      html += '</div></div>';
    });
    html += '</div></div>';
  }
  c.innerHTML = html;
}

          const them = isHome?as:hs;
          if(us>them) resultHtml = '<span class="match-win">'+m.sc+' 胜</span>';
          else if(us===them) resultHtml = '<span class="match-draw">'+m.sc+' 平</span>';
          else resultHtml = '<span class="match-loss">'+m.sc+' 负</span>';
        } else if(opp==='TBC'){resultHtml = '—';}
        else {resultHtml = '<span class="match-pending">⏳</span>';}
        
        h += '<tr><td>'+dateStr+'</td><td><span class="match-group">'+phase+'</span></td>';
        h += '<td class="match-vs">'+(isHome?team+' vs '+opp:opp+' vs '+team)+'</td>';
        h += '<td>'+resultHtml+'</td>';
        h += '<td>'+bj.time+'</td></tr>';
      }
      h += '</tbody></table>';
    } else {h += '<p style="color:var(--text-muted);padding:12px">暂无赛程数据</p>';}
    h += '</div>';
    
    // Stats panel with real data
    let realW=0,realD=0,realL=0,totalPlayed=0;
    for(const m of teamMatches){
      if(m.sc && m.h!=='TBC' && m.a!=='TBC'){
        totalPlayed++;
        const isHome = m.h===team;
        const [hs,as] = m.sc.split('-').map(Number);
        const us = isHome?hs:as;
        const them = isHome?as:hs;
        if(us>them) realW++;
        else if(us===them) realD++;
        else realL++;
      }
    }
    h += '<div class="detail-panel'+(activeTab==='stats'?' active':'')+'" id="panel-stats">';
    h += '<div class="stats-grid">';
    h += '<div class="stat-box"><div class="stat-val">'+totalPlayed+'</div><div class="stat-label">已赛场次</div></div>';
    h += '<div class="stat-box"><div class="stat-val">'+realW+'</div><div class="stat-label">胜</div></div>';
    h += '<div class="stat-box"><div class="stat-val">'+realD+'</div><div class="stat-label">平</div></div>';
    h += '<div class="stat-box"><div class="stat-val">'+realL+'</div><div class="stat-label">负</div></div>';
    h += '<div class="stat-box"><div class="stat-val">'+td.rating.toFixed(1)+'</div><div class="stat-label">战力评分</div></div>';
    h += '<div class="stat-box"><div class="stat-val">'+squad.length+'</div><div class="stat-label">阵容人数</div></div>';
    h += '</div></div></div>';
    
    document.getElementById('detailCard').querySelector('#detailContent').innerHTML = h;
  }
  
  window.renderDetailTab = function(t,tabName){
    renderDetail(tabName||'squad');
  };
  
  renderDetail('squad');
  overlay.classList.add('active');
  document.body.classList.add('detail-view');
  overlay.onclick = function(e){if(e.target===overlay) closeDetail();};
  document.addEventListener('keydown',__closeHandler = function(e){if(e.key==='Escape') closeDetail();});
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('active');
  document.body.classList.remove('detail-view');
  if(window.__closeHandler) document.removeEventListener('keydown',__closeHandler);
}

// ===== MATCH REPORT POPUP =====
function openMatchReport(idx){
  const m = MATCHES[idx];
  if(!m) return;
  const cnH = TEAMS[m.h] ? TEAMS[m.h].zh : m.h;
  const cnA = TEAMS[m.a] ? TEAMS[m.a].zh : m.a;
  const isKO = m.p!=='GS';
  const grpLabel = isKO ? PHASE_LABELS[m.p] : 'Group '+m.grp;
  const isTBC = m.h==='TBC'||m.a==='TBC';
  const hasScore = m.sc && !isTBC;
  const bj = ukToBeijing(m.d,m.m,m.t);
  
  let stars = '';
  let homeRating = m.h !== 'TBC' && TEAMS[m.h] ? TEAMS[m.h].rating : 0;
  let awayRating = m.a !== 'TBC' && TEAMS[m.a] ? TEAMS[m.a].rating : 0;
  
  let html = '<div class="mr-header">';
  html += '<div class="mr-teams">';
  // Home team
  if(isTBC){
    html += '<div class="mr-team"><span class="flag">❓</span><span class="name">待定</span></div>';
  } else {
    const flH = TEAMS[m.h] ? TEAMS[m.h].flag:'';
    html += '<div class="mr-team"><span class="flag">'+flH+'</span><span class="name">'+m.h+'</span><span class="zh">'+cnH+'</span></div>';
  }
  // Score
  if(hasScore){
    html += '<div class="mr-score">'+(m.et ? m.sc.split('-')[0] : m.sc.split('-')[0])+'<span class="mr-colon"> : </span>'+(m.et ? m.sc.split('-')[1] : m.sc.split('-')[1])+'</div>';
  } else {
    html += '<div class="mr-score" style="font-size:28px;background:none;color:var(--text-muted);-webkit-text-fill-color:var(--text-muted);"><span>VS</span></div>';
  }
  // Away team
  if(isTBC){
    html += '<div class="mr-team"><span class="flag">❓</span><span class="name">待定</span></div>';
  } else {
    const flA = TEAMS[m.a] ? TEAMS[m.a].flag:'';
    html += '<div class="mr-team"><span class="flag">'+flA+'</span><span class="name">'+m.a+'</span><span class="zh">'+cnA+'</span></div>';
  }
  html += '</div>';
  if(hasScore){
    const isLive = isLiveMatch(m);
    html += '<div class="mr-status">'+(isLive?'🔴 进行中':'🏁 已结束')+(m.et && !isLive?' · 含加时赛':'')+'</div>';
  } else {
    html += '<div class="mr-status">📅 '+m.d+'/'+m.m+' · '+m.t+' UK → 北京时间 '+bj.time+'</div>';
  }
  html += '<div class="mr-group">'+grpLabel+' · Round '+(idx+1)+'/'+MATCHES.length+'</div></div>';
  
  // Body
  html += '<div class="mr-body">';
  
  // Events section
  html += '<div class="mr-section-title">⚡ 比赛事件</div>';
  if(m.ev && m.ev.length>0){
    // Sort events by minute
    const evts = [...m.ev].sort((a,b)=>a.min-b.min);
    for(const e of evts){
      const isHome = e.t==='h';
      const sideCls = isHome ? '' : ' away';
      html += '<div class="mr-event'+sideCls+'">';
      html += '<span class="mr-event-time">'+e.min+"'"+'</span>';
      html += '<span class="mr-event-icon">'+e.ic+'</span>';
      html += '<span class="mr-event-desc"><span class="player">'+e.p+'</span> · '+e.d+'</span>';
      html += '</div>';
    }
  } else if(hasScore){
    html += '<div class="mr-empty">暂无详细进球记录</div>';
  } else if(isTBC){
    html += '<div class="mr-empty">淘汰赛对阵待定</div>';
  } else {
    html += '<div class="mr-empty">⏳ 比赛尚未开始</div>';
  }
  
  // Team lineups & ratings
  if(!isTBC && SQUADS[m.h] && SQUADS[m.a]){
    html += '<div class="mr-section-title">🏆 球队战力对比</div>';
    html += '<div class="mr-lineup-grid">';
    html += '<div class="mr-lineup-col"><h4>'+cnH+' <span style="font-weight:400;color:var(--text-muted)">('+renderStars(homeRating,16)+')</span></h4><ul>';
    const squadH = SQUADS[m.h];
    for(let i=0;i<Math.min(7,squadH.length);i++){
      const p = squadH[i];
      html += '<li><span class="pos-tag pos-'+p.p+'">'+p.p+'</span>'+p.n+'</li>';
    }
    html += '</ul></div>';
    html += '<div class="mr-lineup-col"><h4>'+cnA+' <span style="font-weight:400;color:var(--text-muted)">('+renderStars(awayRating,16)+')</span></h4><ul>';
    const squadA = SQUADS[m.a];
    for(let i=0;i<Math.min(7,squadA.length);i++){
      const p = squadA[i];
      html += '<li><span class="pos-tag pos-'+p.p+'">'+p.p+'</span>'+p.n+'</li>';
    }
    html += '</ul></div>';
    html += '</div>';
  }
  
  html += '</div>'; // end body
  
  document.getElementById('matchReportContent').innerHTML = html;
  document.getElementById('matchReportOverlay').classList.add('active');
  
  // Close handler
  const overlay = document.getElementById('matchReportOverlay');
  overlay.onclick = function(e){if(e.target===overlay) closeMatchReport();};
  document.addEventListener('keydown', window.__mrCloseHandler = function(e){if(e.key==='Escape') closeMatchReport();});
}

function closeMatchReport(){
  document.getElementById('matchReportOverlay').classList.remove('active');
  if(window.__mrCloseHandler) document.removeEventListener('keydown', window.__mrCloseHandler);
}

buildCalendar();
renderGroups();
